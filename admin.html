<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面｜お仕事発見隊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f4f2;min-height:100vh;color:#1a1a1a;}

/* ログイン画面 */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo div{font-size:40px;margin-bottom:8px;}
.login-logo h1{font-size:18px;font-weight:700;color:#0F6E56;}
.login-logo p{font-size:12px;color:#888;margin-top:4px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;}
.login-field input{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid #dde8de;border-radius:10px;font-family:inherit;}
.login-field input:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,0.12);}
.login-btn{width:100%;padding:14px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.login-error{color:#E24B4A;font-size:13px;text-align:center;margin-top:10px;min-height:20px;}

/* メイン画面 */
.main-screen{display:none;}
.top-bar{background:#1D9E75;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-bar h1{color:#fff;font-size:16px;font-weight:700;}
.top-bar-right{display:flex;align-items:center;gap:10px;}
.logout-btn{background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;}

/* フィルターバー */
.filter-bar{background:#fff;padding:12px 16px;border-bottom:1px solid #e8ede9;display:flex;gap:8px;overflow-x:auto;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #dde8de;background:#fff;color:#555;font-family:inherit;}
.filter-chip.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}

/* 検索バー */
.search-bar{padding:12px 16px;background:#fff;border-bottom:1px solid #e8ede9;}
.search-input{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #dde8de;border-radius:10px;font-family:inherit;}
.search-input:focus{outline:none;border-color:#1D9E75;}

/* 統計バー */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8ede9;border-bottom:1px solid #e8ede9;}
.stat-item{background:#fff;padding:12px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:#1D9E75;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}

/* 写真グリッド */
.photo-section{padding:12px 16px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-header h2{font-size:14px;font-weight:700;color:#333;}
.section-header span{font-size:12px;color:#888;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.photo-card{position:relative;aspect-ratio:1;overflow:hidden;border-radius:4px;cursor:pointer;}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-card .photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.5) 0%,transparent 50%);opacity:0;}
.photo-card:hover .photo-overlay{opacity:1;}
.photo-card .photo-info{position:absolute;bottom:4px;left:4px;right:4px;display:none;}
.photo-card:hover .photo-info{display:block;}
.photo-card .photo-company{color:#fff;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 企業グループ */
.company-group{margin-bottom:20px;}
.company-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #e4ede6;}
.company-name{font-size:14px;font-weight:700;color:#0F6E56;}
.company-meta{font-size:12px;color:#888;}
.company-date{font-size:11px;color:#aaa;margin-top:2px;}

/* 写真モーダル */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;flex-direction:column;}
.modal.show{display:flex;}
.modal-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.modal-title{color:#fff;font-size:14px;font-weight:600;}
.modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px;}
.modal-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-img-wrap img{max-width:100%;max-height:100%;border-radius:8px;}
.modal-footer{padding:16px;display:flex;gap:8px;}
.modal-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
.modal-btn.download{background:#1D9E75;color:#fff;}
.modal-btn.delete{background:#E24B4A;color:#fff;}
.modal-meta{padding:0 16px 12px;color:#aaa;font-size:12px;}

/* ローディング */
.loading{text-align:center;padding:48px 24px;color:#888;}
.loading-spinner{font-size:32px;animation:spin 1s linear infinite;display:block;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 空状態 */
.empty-state{text-align:center;padding:48px 24px;color:#888;}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* 企業フィルタードロップダウン */
.company-filter{padding:0 16px 12px;background:#fff;border-bottom:1px solid #e8ede9;}
.company-select{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #dde8de;border-radius:10px;font-family:inherit;-webkit-appearance:none;appearance:none;background:#fff;}
.company-select:focus{outline:none;border-color:#1D9E75;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div>📸</div>
      <h1>お仕事発見隊</h1>
      <p>写真管理システム｜事務局専用</p>
    </div>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="loginEmail" placeholder="example@gmail.com">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワードを入力">
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- メイン画面 -->
<div class="main-screen" id="mainScreen">
  <div class="top-bar">
    <h1>📸 写真管理</h1>
    <div class="top-bar-right">
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- 統計 -->
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="statTotal">-</div><div class="stat-label">総提出数</div></div>
    <div class="stat-item"><div class="stat-num" id="statPhotos">-</div><div class="stat-label">総写真枚数</div></div>
    <div class="stat-item"><div class="stat-num" id="statCompanies">-</div><div class="stat-label">提出企業数</div></div>
  </div>

  <!-- 検索・フィルター -->
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 企業名で検索..." oninput="filterPhotos()">
  </div>
  <div class="company-filter">
    <select class="company-select" id="companyFilter" onchange="filterPhotos()">
      <option value="">すべての企業</option>
    </select>
  </div>
  <div class="filter-bar">
    <button class="filter-chip active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-chip" onclick="setFilter('2026',this)">2026年度</button>
    <button class="filter-chip" onclick="setFilter('2027',this)">2027年度</button>
  </div>

  <!-- 写真一覧 -->
  <div class="photo-section" id="photoSection">
    <div class="loading"><span class="loading-spinner">⏳</span>読み込み中...</div>
  </div>
</div>

<!-- 写真モーダル -->
<div class="modal" id="photoModal">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">写真</div>
    <button class="modal-close" onclick="closeModal()">×</button>
  </div>
  <div class="modal-img-wrap">
    <img id="modalImg" src="" alt="">
  </div>
  <div class="modal-meta" id="modalMeta"></div>
  <div class="modal-footer">
    <button class="modal-btn download" onclick="downloadPhoto()">⬇️ ダウンロード</button>
    <button class="modal-btn delete" onclick="deletePhoto()">🗑 削除</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getStorage, ref, deleteObject } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDL-IV2jaBFqZ2SaU8KOQkjZwWGlS8d8Hs",
    authDomain: "fpjphoto-6431e.firebaseapp.com",
    projectId: "fpjphoto-6431e",
    storageBucket: "fpjphoto-6431e.firebasestorage.app",
    messagingSenderId: "1070789469277",
    appId: "1:1070789469277:web:8fd31e0eca39a857fb59b4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const storage = getStorage(app);

  window._db = db;
  window._auth = auth;
  window._storage = storage;
  window._signInWithEmailAndPassword = signInWithEmailAndPassword;
  window._signOut = signOut;
  window._collection = collection;
  window._getDocs = getDocs;
  window._deleteDoc = deleteDoc;
  window._doc = doc;
  window._query = query;
  window._orderBy = orderBy;
  window._ref = ref;
  window._deleteObject = deleteObject;

  onAuthStateChanged(auth, function(user) {
    if(user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainScreen').style.display = 'none';
    }
  });
</script>

<script>
var allSubmissions = [];
var currentFilter = 'all';
var currentModal = null;

// ===== ログイン =====
async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pw = document.getElementById('loginPassword').value;
  var errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    await window._signInWithEmailAndPassword(window._auth, email, pw);
  } catch(e) {
    errEl.textContent = 'メールアドレスまたはパスワードが違います';
  }
}

function doLogout() {
  if(confirm('ログアウトしますか？')) window._signOut(window._auth);
}

// ===== データ読み込み =====
async function loadData() {
  try {
    var q = window._query(window._collection(window._db, 'submissions'), window._orderBy('submittedAt','desc'));
    var snapshot = await window._getDocs(q);
    allSubmissions = [];
    snapshot.forEach(function(d) {
      allSubmissions.push({id: d.id, ...d.data()});
    });
    updateStats();
    buildCompanyFilter();
    renderPhotos();
  } catch(e) {
    console.error(e);
    document.getElementById('photoSection').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>データの読み込みに失敗しました</p></div>';
  }
}

// ===== 統計更新 =====
function updateStats() {
  var filtered = getFiltered();
  var totalPhotos = filtered.reduce(function(sum, s){ return sum + (s.photoCount||0); }, 0);
  var companies = new Set(filtered.map(function(s){ return s.companyName; })).size;
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statPhotos').textContent = totalPhotos;
  document.getElementById('statCompanies').textContent = companies;
}

// ===== 企業フィルター構築 =====
function buildCompanyFilter() {
  var companies = [...new Set(allSubmissions.map(function(s){ return s.companyName; }))].sort();
  var sel = document.getElementById('companyFilter');
  sel.innerHTML = '<option value="">すべての企業</option>';
  companies.forEach(function(c) {
    sel.innerHTML += '<option value="' + c + '">' + c + '</option>';
  });
}

// ===== フィルター =====
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-chip').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  updateStats();
  renderPhotos();
}

function getFiltered() {
  var search = document.getElementById('searchInput').value.trim().toLowerCase();
  var company = document.getElementById('companyFilter').value;
  return allSubmissions.filter(function(s) {
    if(currentFilter !== 'all' && s.year !== currentFilter) return false;
    if(company && s.companyName !== company) return false;
    if(search && !s.companyName.toLowerCase().includes(search)) return false;
    return true;
  });
}

function filterPhotos() {
  updateStats();
  renderPhotos();
}

// ===== 写真レンダリング =====
function renderPhotos() {
  var filtered = getFiltered();
  var section = document.getElementById('photoSection');

  if(filtered.length === 0) {
    section.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>写真が見つかりません</p></div>';
    return;
  }

  // 企業ごとにグループ化
  var groups = {};
  filtered.forEach(function(s) {
    var key = s.companyName;
    if(!groups[key]) groups[key] = [];
    groups[key].push(s);
  });

  var html = '';
  Object.keys(groups).forEach(function(company) {
    var submissions = groups[company];
    var totalPhotos = submissions.reduce(function(sum,s){ return sum+(s.photoCount||0); },0);
    html += '<div class="company-group">';
    html += '<div class="company-header">';
    html += '<div><div class="company-name">' + company + '</div>';
    html += '<div class="company-date">' + submissions[0].year + '年度</div></div>';
    html += '<div class="company-meta">📷 ' + totalPhotos + '枚</div>';
    html += '</div>';
    html += '<div class="photo-grid">';
    submissions.forEach(function(s) {
      if(s.photos && s.photos.length > 0) {
        s.photos.forEach(function(photo, idx) {
          html += '<div class="photo-card" onclick="openModal(\'' + s.id + '\',' + idx + ')">';
          html += '<img src="' + photo.url + '" alt="写真" loading="lazy">';
          html += '<div class="photo-overlay"><div class="photo-info"><div class="photo-company">' + s.eventDate + '</div></div></div>';
          html += '</div>';
        });
      }
    });
    html += '</div></div>';
  });

  section.innerHTML = html;
}

// ===== モーダル =====
function openModal(submissionId, photoIdx) {
  var submission = allSubmissions.find(function(s){ return s.id === submissionId; });
  if(!submission || !submission.photos) return;
  var photo = submission.photos[photoIdx];
  currentModal = {submission: submission, photoIdx: photoIdx, photo: photo};

  document.getElementById('modalImg').src = photo.url;
  document.getElementById('modalTitle').textContent = submission.companyName;
  document.getElementById('modalMeta').textContent =
    '📅 ' + submission.eventDate + '　👤 ' + (submission.shooterName || submission.shooterType) + '　📷 ' + (photoIdx+1) + '/' + submission.photos.length + '枚目';
  document.getElementById('photoModal').classList.add('show');
}

function closeModal() {
  document.getElementById('photoModal').classList.remove('show');
  currentModal = null;
}

function downloadPhoto() {
  if(!currentModal) return;
  var a = document.createElement('a');
  a.href = currentModal.photo.url;
  a.download = 'photo.jpg';
  a.target = '_blank';
  a.click();
}

async function deletePhoto() {
  if(!currentModal) return;
  if(!confirm('この写真を削除しますか？')) return;
  try {
    var photoRef = window._ref(window._storage, currentModal.photo.path);
    await window._deleteObject(photoRef);
    // Firestoreからも該当写真を削除
    var sub = currentModal.submission;
    sub.photos.splice(currentModal.photoIdx, 1);
    closeModal();
    await loadData();
    alert('削除しました');
  } catch(e) {
    alert('削除に失敗しました: ' + e.message);
  }
}

// Enterキーでログイン
document.getElementById('loginPassword').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
